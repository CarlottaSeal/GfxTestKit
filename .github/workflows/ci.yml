name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Cloud runner: validate Python code (no GPU needed)
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax (all .py files compile)
        run: python -m py_compile gfx_test.py && find core tests -name "*.py" -exec python -m py_compile {} +

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short

